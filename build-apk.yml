# =========================================================================
# FREE CLOUD APK BUILD — GitHub Actions
# Every time you upload/change code, GitHub builds the APK automatically.
# Download it from: repo -> Actions -> latest run -> Artifacts -> AliBahi-APK
# =========================================================================
name: Build APK

on:
  push:
  workflow_dispatch:      # also allows manual "Run workflow" button

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AliBahi-APK
          path: app/build/outputs/apk/debug/app-debug.apk
